<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="monospace">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1320"/>
      <stop offset="1" stop-color="#05070b"/>
    </linearGradient>
    <radialGradient id="flood" cx="0.7" cy="0.55" r="0.5">
      <stop offset="0" stop-color="#f3a93c" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f3a93c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#sky)"/>
  <rect width="1200" height="800" fill="url(#flood)"/>
  <!-- ground -->
  <rect y="610" width="1200" height="190" fill="#070a0e"/>
  <line x1="0" y1="610" x2="1200" y2="610" stroke="#1b212b" stroke-width="2"/>
  <!-- cinema mass, seen from the south-west: facade recedes to the right -->
  <polygon points="250,260 760,200 760,610 250,610" fill="#11161e"/>
  <polygon points="760,200 1010,250 1010,610 760,610" fill="#0c1117"/>
  <!-- marquee -->
  <rect x="250" y="470" width="510" height="60" fill="#05070b" stroke="#2a3340"/>
  <polygon points="760,460 1010,500 1010,540 760,520" fill="#05070b" stroke="#2a3340"/>
  <!-- vertical blade sign -->
  <rect x="300" y="120" width="58" height="360" fill="#0a0e14" stroke="#36414f"/>
  <text x="329" y="170" fill="#d8d2c0" font-size="34" text-anchor="middle" letter-spacing="2" transform="rotate(90 329 170)" opacity="0.85">L U M I N A</text>
  <!-- windows grid -->
  <g fill="#1d2430">
    <rect x="290" y="300" width="40" height="48"/><rect x="350" y="296" width="40" height="48"/>
    <rect x="410" y="292" width="40" height="48"/><rect x="470" y="288" width="40" height="48"/>
    <rect x="530" y="284" width="40" height="48"/><rect x="590" y="280" width="40" height="48"/>
    <rect x="650" y="276" width="40" height="48"/><rect x="710" y="272" width="40" height="48"/>
  </g>
  <!-- excavator silhouette at work -->
  <g fill="#05070b" stroke="#222a35" stroke-width="2">
    <rect x="820" y="520" width="120" height="70"/>
    <line x1="900" y1="520" x2="1010" y2="430" stroke="#222a35" stroke-width="8"/>
    <line x1="1010" y1="430" x2="1040" y2="500" stroke="#222a35" stroke-width="8"/>
    <circle cx="850" cy="595" r="16"/><circle cx="910" cy="595" r="16"/>
  </g>
  <!-- crosshair on the facade subject -->
  <g stroke="#f3a93c" stroke-width="1.5" opacity="0.9">
    <circle cx="660" cy="360" r="26" fill="none"/>
    <line x1="660" y1="324" x2="660" y2="396"/>
    <line x1="624" y1="360" x2="696" y2="360"/>
  </g>
  <!-- caption -->
  <rect x="0" y="752" width="1200" height="48" fill="#05070b" opacity="0.9"/>
  <text x="20" y="782" fill="#6f7989" font-size="20" letter-spacing="2">EXHIBIT A // STATION SW // 02:12 // FICTIONAL RECONSTRUCTION</text>
</svg>
